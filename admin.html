<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entourage Editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f0eb;
        color: #3a2a1f;
        padding: 24px;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.6rem;
      }
      .subtitle {
        text-align: center;
        color: #8a7a6f;
        margin-bottom: 28px;
        font-size: 0.9rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      }
      .card h2 {
        font-size: 1.1rem;
        margin-bottom: 14px;
        color: #6b4f3a;
        border-bottom: 1px solid #ede6df;
        padding-bottom: 8px;
      }
      .row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
      .col {
        flex: 1;
        min-width: 200px;
      }
      .col h3 {
        font-size: 0.85rem;
        color: #8a7a6f;
        margin-bottom: 8px;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: #8a7a6f;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d9d0c7;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #faf8f5;
      }
      input:focus {
        outline: none;
        border-color: #a68b6b;
        box-shadow: 0 0 0 3px rgba(166, 139, 107, 0.15);
      }
      .name-list {
        margin-bottom: 8px;
      }
      .name-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }
      .name-row input {
        flex: 1;
      }
      .btn-sm {
        background: none;
        border: 1px solid #d9d0c7;
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 0.85rem;
        color: #6b4f3a;
      }
      .btn-sm:hover {
        background: #f0e8df;
      }
      .btn-remove {
        color: #c44;
        border-color: #e4b8b8;
      }
      .btn-remove:hover {
        background: #fde8e8;
      }
      .btn-add {
        margin-top: 4px;
      }
      .actions {
        text-align: center;
        margin-top: 28px;
      }
      .btn-save {
        background: #6b4f3a;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px 48px;
        font-size: 1rem;
        cursor: pointer;
        letter-spacing: 0.04em;
      }
      .btn-save:hover {
        background: #5a3f2e;
      }
      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #3a7d3a;
        color: #fff;
        padding: 12px 28px;
        border-radius: 10px;
        font-size: 0.95rem;
        display: none;
        z-index: 999;
      }
      .toast.error {
        background: #a63a3a;
      }
    </style>
  </head>
  <body>
    <h1>&#128141; Entourage Editor</h1>
    <p class="subtitle">
      Edit the names below, then click Save. Changes appear on the wedding site
      instantly.
    </p>
    <div id="toast" class="toast"></div>

    <form id="editor">
      <!-- Principal Sponsors -->
      <div class="card">
        <h2>Principal Sponsors</h2>
        <div class="row">
          <div class="col">
            <h3>His Side</h3>
            <div id="ps-his" class="name-list"></div>
            <button
              type="button"
              class="btn-sm btn-add"
              onclick="addName('ps-his')"
            >
              + Add name
            </button>
          </div>
          <div class="col">
            <h3>Her Side</h3>
            <div id="ps-her" class="name-list"></div>
            <button
              type="button"
              class="btn-sm btn-add"
              onclick="addName('ps-her')"
            >
              + Add name
            </button>
          </div>
        </div>
      </div>

      <!-- Best Man & Maid of Honor -->
      <div class="card">
        <h2>Best Man &amp; Maid of Honor</h2>
        <div class="row">
          <div class="col">
            <label>Best Man</label>
            <input id="bestMan" />
          </div>
          <div class="col">
            <label>Maid of Honor</label>
            <input id="maidOfHonor" />
          </div>
        </div>
      </div>

      <!-- Groomsmen & Bridesmaids -->
      <div class="card">
        <h2>Groomsmen &amp; Bridesmaids</h2>
        <div class="row">
          <div class="col">
            <h3>Groomsmen</h3>
            <div id="groomsmen" class="name-list"></div>
            <button
              type="button"
              class="btn-sm btn-add"
              onclick="addName('groomsmen')"
            >
              + Add name
            </button>
          </div>
          <div class="col">
            <h3>Bridesmaids</h3>
            <div id="bridesmaids" class="name-list"></div>
            <button
              type="button"
              class="btn-sm btn-add"
              onclick="addName('bridesmaids')"
            >
              + Add name
            </button>
          </div>
        </div>
      </div>

      <!-- Secondary Sponsors -->
      <div class="card">
        <h2>Secondary Sponsors</h2>
        <div class="row">
          <div class="col"><label>Veil</label><input id="ss-veil" /></div>
          <div class="col"><label>Cord</label><input id="ss-cord" /></div>
          <div class="col"><label>Candle</label><input id="ss-candle" /></div>
        </div>
      </div>

      <!-- Bearers -->
      <div class="card">
        <h2>Bearers</h2>
        <div class="row">
          <div class="col">
            <label>Bible Bearer</label><input id="b-bible" />
          </div>
          <div class="col"><label>Coin Bearer</label><input id="b-coin" /></div>
          <div class="col"><label>Ring Bearer</label><input id="b-ring" /></div>
        </div>
      </div>

      <!-- Flower Girls -->
      <div class="card">
        <h2>Flower Girls</h2>
        <div id="flowerGirls" class="name-list"></div>
        <button
          type="button"
          class="btn-sm btn-add"
          onclick="addName('flowerGirls')"
        >
          + Add name
        </button>
      </div>

      <div class="actions">
        <button type="submit" class="btn-save">&#11015; Download entourage-data.json</button>
      </div>
    </form>

    <script>
      /* ── helpers ── */
      function addName(containerId, value) {
        var list = document.getElementById(containerId);
        var row = document.createElement("div");
        row.className = "name-row";
        row.innerHTML =
          '<input value="' +
          (value || "").replace(/"/g, "&quot;") +
          '" />' +
          '<button type="button" class="btn-sm btn-remove" onclick="this.parentElement.remove()">&#10005;</button>';
        list.appendChild(row);
      }

      function getList(containerId) {
        return Array.from(
          document.querySelectorAll("#" + containerId + " .name-row input"),
        )
          .map(function (i) {
            return i.value.trim();
          })
          .filter(Boolean);
      }

      function showToast(msg, isError) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast" + (isError ? " error" : "");
        t.style.display = "block";
        setTimeout(function () {
          t.style.display = "none";
        }, 3000);
      }

      /* ── load current data ── */
      fetch("entourage-data.json")
        .then(function (r) {
          return r.json();
        })
        .then(function (d) {
          d.principalSponsors.his.forEach(function (n) {
            addName("ps-his", n);
          });
          d.principalSponsors.her.forEach(function (n) {
            addName("ps-her", n);
          });
          document.getElementById("bestMan").value = d.bestMan;
          document.getElementById("maidOfHonor").value = d.maidOfHonor;
          d.groomsmen.forEach(function (n) {
            addName("groomsmen", n);
          });
          d.bridesmaids.forEach(function (n) {
            addName("bridesmaids", n);
          });
          document.getElementById("ss-veil").value = d.secondarySponsors.veil;
          document.getElementById("ss-cord").value = d.secondarySponsors.cord;
          document.getElementById("ss-candle").value =
            d.secondarySponsors.candle;
          document.getElementById("b-bible").value = d.bearers.bible;
          document.getElementById("b-coin").value = d.bearers.coin;
          document.getElementById("b-ring").value = d.bearers.ring;
          d.flowerGirls.forEach(function (n) {
            addName("flowerGirls", n);
          });
        });

      /* ── save ── */
      document
        .getElementById("editor")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var data = {
            principalSponsors: {
              his: getList("ps-his"),
              her: getList("ps-her"),
            },
            bestMan: document.getElementById("bestMan").value.trim(),
            maidOfHonor: document.getElementById("maidOfHonor").value.trim(),
            groomsmen: getList("groomsmen"),
            bridesmaids: getList("bridesmaids"),
            secondarySponsors: {
              veil: document.getElementById("ss-veil").value.trim(),
              cord: document.getElementById("ss-cord").value.trim(),
              candle: document.getElementById("ss-candle").value.trim(),
            },
            bearers: {
              bible: document.getElementById("b-bible").value.trim(),
              coin: document.getElementById("b-coin").value.trim(),
              ring: document.getElementById("b-ring").value.trim(),
            },
            flowerGirls: getList("flowerGirls"),
          };

          // Vercel is a static host — download the JSON, then commit & push it
          var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = "entourage-data.json";
          a.click();
          URL.revokeObjectURL(url);
          showToast("Downloaded! Replace entourage-data.json in your repo and push.");
        });
    </script>
  </body>
</html>
